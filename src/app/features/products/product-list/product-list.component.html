<div class="product-list-container">
    <div class="header">
        <div class="header-title">
            <h1>Products</h1>
            <mat-chip-listbox *ngIf="groupId" class="filter-chip">
                <mat-chip (removed)="clearGroupFilter()">
                    Group: {{groupName || groupId}}
                    <button matChipRemove aria-label="remove">
                        <mat-icon>cancel</mat-icon>
                    </button>
                </mat-chip>
            </mat-chip-listbox>
        </div>

        <div class="header-actions">
            <mat-form-field appearance="outline" class="search-field">
                <mat-label>Search</mat-label>
                <input matInput placeholder="Ex. Smartphone" #input>
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
            <button mat-raised-button color="primary" class="add-btn" (click)="addProduct()">
                <mat-icon>add_shopping_cart</mat-icon>
                Add Product
            </button>
        </div>
    </div>

    <div class="table-container mat-elevation-z8">
        <div class="loading-shade" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>

        <table mat-table [dataSource]="data" matSort>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                <td mat-cell *matCellDef="let row"> {{row.name}} </td>
            </ng-container>

            <!-- Group Column -->
            <ng-container matColumnDef="groupName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Group </th>
                <td mat-cell *matCellDef="let row"> {{row.groupName}} </td>
            </ng-container>

            <!-- Part Number Column -->
            <ng-container matColumnDef="partNumber">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Part Number </th>
                <td mat-cell *matCellDef="let row"> {{row.partNumber}} </td>
            </ng-container>

            <!-- Price Column -->
            <ng-container matColumnDef="listPrice">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
                <td mat-cell *matCellDef="let row"> {{row.listPrice | currency}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let row">
                    <button mat-icon-button (click)="editProduct(row)" aria-label="Edit product"
                        class="action-btn edit-btn">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button (click)="deleteProduct(row)" aria-label="Delete product"
                        class="action-btn delete-btn">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
            </tr>
        </table>

        <mat-paginator [length]="resultsLength" [pageSize]="20" [pageSizeOptions]="[5, 10, 20, 50]"
            aria-label="Select page of products"></mat-paginator>
    </div>
</div>
