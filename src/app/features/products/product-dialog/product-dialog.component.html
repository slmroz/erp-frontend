<h2 mat-dialog-title>{{ isEditMode ? 'Edit Product' : 'Add Product' }}</h2>
<mat-dialog-content>
    <form [formGroup]="form" class="product-form">
        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Name</mat-label>
                <input matInput formControlName="name" placeholder="Ex. Smartphone X1">
                <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Part Number</mat-label>
                <input matInput formControlName="partNumber" placeholder="Ex. SN-12345">
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Product Group</mat-label>
                <mat-select formControlName="productGroupId">
                    <mat-option *ngFor="let group of groups" [value]="group.id">
                        {{group.name}}
                    </mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('productGroupId')?.hasError('required')">Group is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>OEM Brand</mat-label>
                <input matInput formControlName="oemBrand" placeholder="Ex. TechCorp">
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>List Price</mat-label>
                <input matInput type="number" formControlName="listPrice" placeholder="0.00">
                <span matPrefix>$&nbsp;</span>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Weight (kg)</mat-label>
                <input matInput type="number" formControlName="weightKg" placeholder="0.0">
                <span matSuffix>&nbsp;kg</span>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3"
                placeholder="Description of the product"></textarea>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" [disabled]="form.invalid || isSaving" (click)="save()">
        {{ isSaving ? 'Saving...' : (isEditMode ? 'Save' : 'Create') }}
    </button>
</mat-dialog-actions>
