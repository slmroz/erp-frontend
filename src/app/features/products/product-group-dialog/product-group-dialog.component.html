<h2 mat-dialog-title>{{ isEditMode ? 'Edit Product Group' : 'Add Product Group' }}</h2>
<mat-dialog-content>
    <form [formGroup]="form" class="product-group-form">
        <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Ex. Electronics">
            <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3" placeholder="Description of the group"></textarea>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" [disabled]="form.invalid || isSaving" (click)="save()">
        {{ isSaving ? 'Saving...' : (isEditMode ? 'Save' : 'Create') }}
    </button>
</mat-dialog-actions>
