<div class="currency-list-container">
    <div class="header">
        <div class="header-title">
            <h1>Currencies</h1>
        </div>

        <div class="header-actions">
            <button mat-stroked-button color="accent" class="action-btn-main" (click)="refreshData()"
                [disabled]="isLoadingResults" matTooltip="Fetch latest rates from server">
                <mat-icon>refresh</mat-icon>
                Refresh
            </button>
            <button mat-raised-button color="primary" class="action-btn-main" (click)="addCurrency()">
                <mat-icon>add</mat-icon>
                Add Currency
            </button>
        </div>
    </div>

    <div class="table-container mat-elevation-z8">
        <div class="loading-shade" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>

        <table mat-table [dataSource]="data" matSort>

            <!-- Base Currency Column -->
            <ng-container matColumnDef="baseCurrency">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Base </th>
                <td mat-cell *matCellDef="let row"> {{row.baseCurrency}} </td>
            </ng-container>

            <!-- Target Currency Column -->
            <ng-container matColumnDef="targetCurrency">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Target </th>
                <td mat-cell *matCellDef="let row"> {{row.targetCurrency}} </td>
            </ng-container>

            <!-- Rate Column -->
            <ng-container matColumnDef="rate">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Rate </th>
                <td mat-cell *matCellDef="let row"> {{row.rate | number:'1.4-4'}} </td>
            </ng-container>

            <!-- Last Updated Column -->
            <ng-container matColumnDef="lastUpdatedAt">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Last Updated </th>
                <td mat-cell *matCellDef="let row"> {{row.lastUpdatedAt | date:'short'}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let row">
                    <button mat-icon-button (click)="editCurrency(row)" aria-label="Edit currency"
                        class="action-btn edit-btn" matTooltip="Edit rate">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button (click)="deleteCurrency(row)" aria-label="Delete currency"
                        class="action-btn delete-btn" matTooltip="Delete currency pair">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="5">No currency rates found.</td>
            </tr>
        </table>

        <mat-paginator [length]="resultsLength" [pageSize]="20" [pageSizeOptions]="[5, 10, 20, 50]"
            aria-label="Select page of currencies"></mat-paginator>
    </div>
</div>
